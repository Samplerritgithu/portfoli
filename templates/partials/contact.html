<section id="contact" class="contact section">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Contact</span>
      <h2 class="section-title">Let's Build Something Great</h2>
    </div>
    <div class="contact-grid">
      <div class="contact-info glass-card">
        <div
          class="availability {% if site.is_available %}available{% endif %}"
        >
          <span class="pulse-dot"></span>
          {{ site.availability_text|default:"Open to opportunities" }}
        </div>
        <p>
          Based in Hyderabad, India. Open to remote and hybrid roles worldwide.
        </p>
        <div class="contact-links">
          <a href="mailto:{{ contact_email }}"
            ><i class="fas fa-envelope"></i> {{ contact_email|default:"Email me"
            }}</a
          >
          <a href="{{ linkedin_url }}" target="_blank" rel="noopener"
            ><i class="fab fa-linkedin"></i> LinkedIn</a
          >
          <a href="{{ github_url }}" target="_blank" rel="noopener"
            ><i class="fab fa-github"></i> GitHub</a
          >
        </div>
        <div class="contact-map">
          <iframe
            title="Hyderabad Map"
            src="https://www.openstreetmap.org/export/embed.html?bbox=78.40%2C17.35%2C78.55%2C17.50&layer=mapnik&marker=17.385%2C78.4867"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          >
          </iframe>
        </div>
      </div>
      <form class="contact-form glass-card" id="contactForm">
        {% csrf_token %}
        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Your name"
          />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="you@email.com"
          />
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input
            type="text"
            id="subject"
            name="subject"
            required
            placeholder="Project inquiry"
          />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            required
            placeholder="Tell me about your opportunity..."
          ></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-paper-plane"></i> Send Message
        </button>
        <div class="form-status" id="formStatus"></div>
      </form>
    </div>
  </div>
</section>
