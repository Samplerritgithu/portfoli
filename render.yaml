# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo → Render detects render.yaml → add env vars → deploy

services:
  - type: web
    name: portfolio-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: GITHUB_URL
        sync: false
      - key: LINKEDIN_URL
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_db
    user: portfolio_user
